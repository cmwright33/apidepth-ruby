name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # required for RubyGems trusted publisher (OIDC)
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
      - name: Build gem
        run: gem build apidepth.gemspec
      - name: Get RubyGems OIDC token
        id: rubygems-token
        uses: actions/github-script@v7
        with:
          script: |
            const oidcToken = await core.getIDToken('rubygems.org');
            const response = await fetch('https://rubygems.org/api/v1/trusted_publishing/tokens', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ oidc_token: oidcToken }),
            });
            if (!response.ok) {
              const body = await response.text();
              core.setFailed(`RubyGems token exchange failed (${response.status}): ${body}`);
              return;
            }
            const { rubygems_api_key } = await response.json();
            core.setSecret(rubygems_api_key);
            core.setOutput('api_key', rubygems_api_key);
      - name: Push to RubyGems
        run: gem push apidepth-*.gem
        env:
          GEM_HOST_API_KEY: ${{ steps.rubygems-token.outputs.api_key }}
