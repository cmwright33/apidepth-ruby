name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # required for RubyGems trusted publisher (OIDC)
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
      - name: Build gem
        run: gem build apidepth.gemspec
      - name: Get RubyGems OIDC token
        id: rubygems-token
        run: |
          OIDC_TOKEN=$(curl --silent \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=rubygems.org" \
            --header "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            | jq -r '.value')
          API_KEY=$(curl --silent https://rubygems.org/api/v1/trusted_publishing/tokens \
            --header 'Content-Type: application/json' \
            --data "{\"oidc_token\": \"${OIDC_TOKEN}\"}" \
            | jq -r '.rubygems_api_key')
          echo "::add-mask::${API_KEY}"
          echo "api_key=${API_KEY}" >> "${GITHUB_OUTPUT}"
      - name: Push to RubyGems
        run: gem push apidepth-*.gem
        env:
          GEM_HOST_API_KEY: ${{ steps.rubygems-token.outputs.api_key }}
